<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6b73" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MPDG Hub" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MPDG PWA Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="hub-styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__badge">MPDG</div>
    <h1>MPDG PWA Hub</h1>
    <p>One home screen for dental dropdown apps, treatment planning tools, and reference apps.</p>
    <p style="margin-top:14px;line-height:1.5;">
      <strong>Dr. Glenn A. Takenaga, DDS, MSc</strong><br>
      333 El Dorado Street<br>
      Monterey, CA 93940<br>
      Phone: (831) 373-3068
    </p>
  </header>

  <main class="shell">
    <section class="controls" aria-label="Hub controls">
      <label for="groupSelect">Choose app group</label>
      <select id="groupSelect"></select>

      <label for="searchInput">Search apps</label>
      <input id="searchInput" type="search" placeholder="Search treatment, fee, CDT..." autocomplete="off" />
    </section>

    <section id="groupIntro" class="group-intro"></section>
    <section id="appGrid" class="app-grid" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <p>Offline-ready starter hub. Edit <strong>apps-config.js</strong> to add or rearrange apps.</p>
  </footer>

  <script src="apps-config.js"></script>
  <script src="hub-app.js"></script>
</body>
</html>
